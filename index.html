  "Sled Push / Battle Ropes":{muscle:"Conditioning",swaps:["Kettlebell Swings","Box Jumps","Rowing Machine Intervals","Burpees"]},
  "Kettlebell Swings":{muscle:"Conditioning",swaps:["Romanian Deadlift High Pull","Jump Rope","Dumbbell Swing"]},
  "Jump Rope":{muscle:"Cardio",swaps:["Box Step-Ups fast pace","Jumping Jacks","High Knees","Stair Climber"]},

const WORKOUTS = [
  {id:1,name:"Chest + Triceps",emoji:"💪",duration:"60–70 min",cardio:"20–25 min incline walk @ 130–145 bpm",
   exercises:[{name:"Flat Barbell Bench Press",sets:4,reps:"6–8",note:"Primary strength driver"},{name:"Incline Dumbbell Press",sets:3,reps:"10–12",note:"Upper chest"},{name:"Cable Fly / Pec Deck",sets:3,reps:"12–15",note:"Stretch focus"},{name:"Close-Grip Bench Press",sets:3,reps:"8–10",note:"Tricep overload"},{name:"Overhead Tricep Extension",sets:3,reps:"10–12",note:"Long head"},{name:"Tricep Pushdown",sets:3,reps:"12–15",note:"Finisher"}]},
  {id:2,name:"Back + Biceps",emoji:"🏋️",duration:"65–75 min",cardio:"20–25 min incline walk @ 130–145 bpm",
   exercises:[{name:"Barbell / Dumbbell Row",sets:4,reps:"6–8",note:"Horizontal pull"},{name:"Lat Pulldown",sets:3,reps:"10–12",note:"Width"},{name:"Cable Row (Seated)",sets:3,reps:"10–12",note:"Mid-back"},{name:"Face Pulls",sets:3,reps:"15–20",note:"Rear delt"},{name:"Barbell / EZ Bar Curl",sets:3,reps:"8–10",note:"Primary bicep"},{name:"Hammer Curl",sets:3,reps:"10–12",note:"Brachialis"},{name:"Incline Dumbbell Curl",sets:2,reps:"12–15",note:"Long head"}]},
  {id:3,name:"Legs + Shoulders",emoji:"🦵",duration:"70–80 min",cardio:"15–20 min incline walk",
   exercises:[{name:"Goblet Squat",sets:4,reps:"10–12",note:"QL-safe"},{name:"Walking Lunges",sets:3,reps:"12/leg",note:"Unilateral"},{name:"Romanian Deadlift",sets:3,reps:"10–12",note:"Monitor QL"},{name:"Leg Press",sets:3,reps:"12–15",note:"Low spinal load"},{name:"Seated DB Shoulder Press",sets:4,reps:"8–10",note:"Primary shoulder"},{name:"Lateral Raises",sets:3,reps:"15–20",note:"V-taper"},{name:"Rear Delt Fly",sets:3,reps:"15–20",note:"3D shoulder"}]},
  {id:4,name:"Arms + Core",emoji:"🎯",duration:"55–65 min",cardio:"25–30 min incline walk",
   exercises:[{name:"EZ Bar Preacher Curl",sets:3,reps:"10–12",note:"Peak contraction"},{name:"Cable Curl",sets:3,reps:"12–15",note:"Constant tension"},{name:"Skull Crushers",sets:3,reps:"10–12",note:"Tricep mass"},{name:"Dips (weighted if able)",sets:3,reps:"8–12",note:"Tricep+chest"},{name:"Hanging Knee Raises",sets:3,reps:"15–20",note:"Lower abs"},{name:"Cable Crunches",sets:3,reps:"15–20",note:"Weighted abs"},{name:"Plank",sets:3,reps:"30–45 sec",note:"Core"},{name:"Side Extension / Side Plank",sets:2,reps:"30 sec/side",note:"Oblique+QL"}]},
  {id:5,name:"Conditioning",emoji:"⚡",duration:"30–45 min",cardio:"This IS the cardio day",optional:true,
   exercises:[{name:"Incline Walk",sets:1,reps:"30–40 min",note:"Steady state"},{name:"Sled Push / Battle Ropes",sets:5,reps:"30s on/30s off",note:"If available"},{name:"Kettlebell Swings",sets:4,reps:"15–20",note:"Posterior+cardio"},{name:"Jump Rope",sets:5,reps:"2 min rounds",note:"Low impact"}]},
];

const GOALS = [
  {id:"bali",label:"Bali Trip",icon:"🏖️",targetWeight:86,targetBF:17.5,deadline:"2026-08-20",color:C.accent},
  {id:"longterm",label:"Long-Term Physique",icon:"🏆",targetWeight:83,targetBF:15,deadline:"2027-01-01",color:C.blue},
];

const TABS = ["Today","Log Workout","Log Nutrition","History","Plan","Goals","Coach"];
const todayStr = () => new Date().toISOString().split("T")[0];

function App() {
  const [tab, setTab] = useState("Today");
  const [loaded, setLoaded] = useState(false);
  const [dbError, setDbError] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [toast, setToast] = useState(null);
  const [profile, setProfile] = useState({weight:90.7,bf:20.1,smm:41.7,waist:105.4,whr:1.03,visceral:8,next_workout_idx:0,active_goal:"bali"});
  const [weightHistory, setWeightHistory] = useState([]);
  const [workoutLogs, setWorkoutLogs] = useState({});
  const [nutritionLogs, setNutritionLogs] = useState({});
  const [coachInput, setCoachInput] = useState("");
  const [coachResponse, setCoachResponse] = useState("");
  const [coachLoading, setCoachLoading] = useState(false);

  const showToast = (msg, color=C.accent) => { setToast({msg,color}); setTimeout(()=>setToast(null),2800); };
  const setSaved = () => { setSyncStatus("saved"); setTimeout(()=>setSyncStatus("idle"),2000); };

  useEffect(()=>{
    (async()=>{
      try {
        const [{data:p},{data:wh},{data:wl},{data:nl}] = await Promise.all([
          db.from("profiles").select("*").eq("id","rohan"),
          db.from("weight_history").select("*").order("date",{ascending:true}),
          db.from("workout_logs").select("*").order("date",{ascending:false}),
          db.from("nutrition_logs").select("*").order("date",{ascending:false}),
        ]);
        if(p&&p.length>0) setProfile(p[0]);
        if(wh) setWeightHistory(wh);
        if(wl){const m={};wl.forEach(r=>{m[r.date]=r;});setWorkoutLogs(m);}
        if(nl){const m={};nl.forEach(r=>{m[r.date]=r;});setNutritionLogs(m);}
        setLoaded(true);
      } catch(e){setDbError(e.message);setLoaded(true);}
    })();
  },[]);

  const saveProfile = async(updates)=>{
    const u={...profile,...updates,updated_at:new Date().toISOString()};
    setProfile(u); setSyncStatus("saving");
    const{error}=await db.from("profiles").upsert(u);
    if(error){setSyncStatus("error");showToast("Sync error",C.red);}else setSaved();
  };
  const saveWorkoutLog = async(date,log)=>{
    const row={...log,date,saved_at:new Date().toISOString()};
    setWorkoutLogs(p=>({...p,[date]:row})); setSyncStatus("saving");
    const{error}=await db.from("workout_logs").upsert(row,{onConflict:"date"});
    if(error){setSyncStatus("error");showToast("Sync error",C.red);}else{setSaved();showToast("Workout saved ✓");}
  };
  const saveNutritionLog = async(date,log)=>{
    const row={...log,date,saved_at:new Date().toISOString()};
    setNutritionLogs(p=>({...p,[date]:row})); setSyncStatus("saving");
    const{error}=await db.from("nutrition_logs").upsert(row,{onConflict:"date"});
    if(error){setSyncStatus("error");showToast("Sync error",C.red);}else{setSaved();showToast("Nutrition saved ✓");}
  };
  const saveWeight = async(date,weight)=>{
    const row={date,weight:+weight};
    setWeightHistory(p=>[...p.filter(h=>h.date!==date),row].sort((a,b)=>a.date.localeCompare(b.date)));
    await db.from("weight_history").upsert(row,{onConflict:"date"});
    await saveProfile({weight:+weight});
  };

  const goal = GOALS.find(g=>g.id===profile.active_goal)||GOALS[0];
  const daysLeft = Math.ceil((new Date(goal.deadline)-new Date())/86400000);
  const weightToLose = (profile.weight-goal.targetWeight).toFixed(1);
  const startWeight = weightHistory.length>0?weightHistory[0].weight:95.2;
  const progressPct = Math.max(0,Math.round(((startWeight-profile.weight)/(startWeight-goal.targetWeight))*100));
  const today = todayStr();
  const currentWorkout = WORKOUTS[profile.next_workout_idx||0];
  const todayWorkout = workoutLogs[today];
  const todayNutrition = nutritionLogs[today];

  const sc={padding:"12px 14px 100px"};
  const card={background:C.card,borderRadius:12,padding:14,marginBottom:10,border:`1px solid ${C.border}`};
  const lbl={fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.9px",marginBottom:10};
  const inp={background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:14,padding:"10px 12px",width:"100%",fontFamily:"inherit",boxSizing:"border-box"};
  const ta={...inp,minHeight:70,resize:"vertical"};
  const btn=(bg,ex={})=>({background:bg,color:bg===C.accent?C.accentText:C.text,border:"none",borderRadius:10,padding:"13px 16px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",marginTop:8,...ex});
  const obtn={background:"none",border:`1px solid ${C.border}`,color:C.soft,borderRadius:10,padding:"11px 16px",fontSize:13,fontWeight:600,cursor:"pointer",width:"100%",marginTop:8};

  const MacroBar=({protein,carbs,fat})=>{
    const t=((+protein)*4+(+carbs)*4+(+fat)*9)||1;
    return(<div><div style={{display:"flex",height:7,borderRadius:4,overflow:"hidden",gap:1}}>
      <div style={{width:`${(protein*4/t)*100}%`,background:C.accent}}/><div style={{width:`${(carbs*4/t)*100}%`,background:C.amber}}/><div style={{width:`${(fat*9/t)*100}%`,background:"#FF7EA6"}}/>
    </div><div style={{display:"flex",gap:12,marginTop:5}}>
      <span style={{fontSize:11,color:C.accent}}>● P {protein}g</span><span style={{fontSize:11,color:C.amber}}>● C {carbs}g</span><span style={{fontSize:11,color:"#FF7EA6"}}>● F {fat}g</span>
    </div></div>);
  };

  const WeightChart=({history})=>{
    if(!history||history.length<2) return <div style={{fontSize:12,color:C.muted,textAlign:"center",padding:"16px 0"}}>Log more weigh-ins to see trend</div>;
    const r=history.slice(-20),ws=r.map(h=>+h.weight),all=[...ws,goal.targetWeight];
    const mn=Math.min(...all)-0.5,mx=Math.max(...all)+0.5,W=320,H=80;
    const px=i=>(i/(r.length-1))*W,py=w=>H-((w-mn)/(mx-mn))*H;
    const pts=r.map((h,i)=>`${px(i)},${py(h.weight)}`).join(" ");
    return(<svg viewBox={`0 0 ${W} ${H+10}`} style={{width:"100%",height:90}}>
      <line x1="0" y1={py(goal.targetWeight)} x2={W} y2={py(goal.targetWeight)} stroke={C.amber} strokeWidth="1" strokeDasharray="5,4" opacity="0.6"/>
      <polyline points={pts} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {r.map((h,i)=><circle key={i} cx={px(i)} cy={py(h.weight)} r="3.5" fill={C.accent}/>)}
      <text x={W-2} y={py(goal.targetWeight)-4} fontSize="9" fill={C.amber} textAnchor="end">{goal.targetWeight}kg goal</text>
    </svg>);
  };

  const Empty=({text})=><div style={{textAlign:"center",padding:"40px 20px",color:C.muted,fontSize:13}}>{text}</div>;

  if(!loaded) return(<div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
    <div style={{fontSize:40}}>🏋️</div><div style={{color:C.soft,fontSize:14}}>Loading your data...</div></div>);
  if(dbError) return(<div style={{background:C.bg,minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:24}}>
    <div style={{fontSize:32}}>⚠️</div><div style={{color:C.red,fontSize:13,textAlign:"center"}}>Connection error: {dbError}</div></div>);

  // TODAY
  const TodayTab=()=>{
    const [showWt,setShowWt]=useState(false);
    const [nw,setNw]=useState(profile.weight);
    return(<div style={sc}>
      <div style={{...card,background:"linear-gradient(135deg,#0D2E22 0%,#0B1A2E 100%)",border:`1px solid ${C.accentDim}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div><div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:"1.2px",textTransform:"uppercase",marginBottom:4}}>{goal.icon} {goal.label}</div>
            <div style={{fontSize:40,fontWeight:800,lineHeight:1}}>{daysLeft}</div><div style={{fontSize:12,color:C.soft,marginTop:2}}>days remaining</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.soft,marginBottom:2}}>to lose</div>
            <div style={{fontSize:30,fontWeight:700,color:C.amber}}>{weightToLose}<span style={{fontSize:14}}> kg</span></div>
            <div style={{fontSize:10,color:C.muted}}>{(weightToLose/(daysLeft/7)).toFixed(2)} kg/week</div></div>
        </div>
        <div style={{marginTop:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:11,color:C.soft}}>{startWeight} → {goal.targetWeight} kg</span>
            <span style={{fontSize:11,color:C.accent,fontWeight:700}}>{progressPct}% done</span></div>
          <div style={{height:6,borderRadius:3,background:C.border}}><div style={{height:"100%",width:`${Math.min(progressPct,100)}%`,background:C.accent,borderRadius:3}}/></div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div style={{...card,marginBottom:0,cursor:"pointer"}} onClick={()=>setShowWt(!showWt)}>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>Weight</div>
          <div style={{fontSize:28,fontWeight:700}}>{profile.weight}<span style={{fontSize:13,color:C.muted}}> kg</span></div>
          <div style={{fontSize:10,color:C.accent,marginTop:3}}>Tap to log →</div></div>
        <div style={{...card,marginBottom:0}}>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>Body Fat</div>
          <div style={{fontSize:28,fontWeight:700}}>{profile.bf}<span style={{fontSize:13,color:C.muted}}>%</span></div>
          <div style={{fontSize:10,color:C.soft,marginTop:3}}>Target: {goal.targetBF}%</div></div>
      </div>
      {showWt&&<div style={{...card,border:`1px solid ${C.accent}40`}}>
        <div style={{fontSize:12,color:C.soft,marginBottom:8}}>Log today's weight</div>
        <div style={{display:"flex",gap:8}}>
          <input type="number" value={nw} onChange={e=>setNw(e.target.value)} style={{...inp,flex:1}} step="0.1"/>
          <button onClick={async()=>{await saveWeight(today,nw);setShowWt(false);showToast(`${nw} kg logged ✓`);}} style={{...btn(C.accent,{width:"auto",padding:"0 20px",marginTop:0})}}>Save</button>
        </div></div>}
      {weightHistory.length>1&&<div style={card}><div style={lbl}>Weight Trend</div><WeightChart history={weightHistory}/></div>}
      <div style={{...card,border:todayWorkout?`1px solid ${C.accentDim}`:`1px solid ${C.border}`}}>
        <div style={lbl}>Today's Workout</div>
        {todayWorkout?<div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>✅</span>
          <div><div style={{fontSize:14,fontWeight:600,color:C.accent}}>{WORKOUTS.find(w=>w.id===todayWorkout.workout_id)?.name} logged</div>
            <div style={{fontSize:11,color:C.soft}}>{todayWorkout.tennis?"🎾 · ":""}{todayWorkout.cardio_min?`${todayWorkout.cardio_min}min cardio · `:""}{todayWorkout.energy?["💀","😴","😐","💪","🔥"][todayWorkout.energy-1]:""}</div></div>
        </div>:<div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <span style={{fontSize:28}}>{currentWorkout.emoji}</span>
            <div><div style={{fontSize:17,fontWeight:700}}>{currentWorkout.name}</div><div style={{fontSize:11,color:C.soft}}>{currentWorkout.duration}</div></div>
          </div>
          <button onClick={()=>setTab("Log Workout")} style={btn(C.accent)}>Start Logging →</button>
        </div>}
      </div>
      <div style={{...card,border:todayNutrition?`1px solid ${C.accentDim}`:`1px solid ${C.border}`}}>
        <div style={lbl}>Today's Nutrition</div>
        {todayNutrition?<div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:26,fontWeight:700}}>{todayNutrition.calories}<span style={{fontSize:13,color:C.muted}}> kcal</span></div>
            <div style={{fontSize:12,color:C.soft,textAlign:"right"}}>
              <div>P <span style={{color:C.accent,fontWeight:700}}>{todayNutrition.protein}g</span></div>
              <div>C <span style={{color:C.amber}}>{todayNutrition.carbs}g</span> · F <span style={{color:"#FF7EA6"}}>{todayNutrition.fat}g</span></div>
            </div></div>
          <MacroBar protein={todayNutrition.protein} carbs={todayNutrition.carbs} fat={todayNutrition.fat}/>

            <div key={k} style={{marginBottom:10}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:4}}>{l}</div>
              <input type="number" value={ib[k]} onChange={e=>setIb(p=>({...p,[k]:e.target.value}))} style={inp} step="0.1"/>
            </div>))}
          <button onClick={handleSave} style={btn(C.accent)}>Save to Cloud →</button>
        </div>:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["Weight",`${profile.weight} kg`,C.text],["Body Fat",`${profile.bf}%`,C.amber],["Muscle Mass",`${profile.smm} kg`,C.accent],["Visceral Fat",profile.visceral,+profile.visceral<=7?C.accent:C.amber],["Waist",`${profile.waist} cm`,C.amber],["WHR",profile.whr,+profile.whr<0.95?C.accent:C.red]].map(([l,v,c])=>(
            <div key={l} style={{background:C.surface,borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:10,color:C.muted}}>{l}</div>
              <div style={{fontSize:20,fontWeight:700,color:c,marginTop:2}}>{v}</div>
            </div>))}
        </div>}
      </div>
      <div style={card}>
        <div style={lbl}>Recomp Progress</div>
        <div style={{fontSize:13,color:C.soft,lineHeight:1.9}}>
          Started <span style={{color:C.text,fontWeight:600}}>95.2 kg / 24.7% BF</span><br/>
          Now <span style={{color:C.accent,fontWeight:600}}>{profile.weight} kg / {profile.bf}% BF</span><br/>
          Lost <span style={{color:C.accent,fontWeight:600}}>{(95.2-profile.weight).toFixed(1)} kg</span> · Bench 75×3 → 75×7 ✓
        </div>
      </div>
    </div>);
  };

  // COACH
  const CoachTab=()=>{
    const rW=Object.entries(workoutLogs).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
    const rN=Object.entries(nutritionLogs).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7);
    const avgP=rN.length?Math.round(rN.reduce((s,[,v])=>s+(+v.protein||0),0)/rN.length):null;
    const avgCal=rN.length?Math.round(rN.reduce((s,[,v])=>s+(+v.calories||0),0)/rN.length):null;

    const callCoach=async()=>{
      if(!coachInput.trim()) return;
      setCoachLoading(true);setCoachResponse("");
      try {
        const wSum=rW.map(([date,log])=>{
          const w=WORKOUTS.find(wp=>wp.id===log.workout_id);
          const top=log.exercises?.slice(0,3).map(ex=>{const b=ex.sets?.filter(s=>s.weight&&s.reps).map(s=>`${s.weight}kg×${s.reps}`).join(",");return b?`${ex.name}(${b})`:null;}).filter(Boolean).join("|");
          return `${date} ${w?.name} E:${log.energy}/5${log.tennis?" Tennis":""}${top?` | ${top}`:""}`;
        }).join("\n");
        const nSum=rN.map(([date,log])=>`${date}: ${log.calories}kcal P:${log.protein}g C:${log.carbs}g F:${log.fat}g${log.notes?` [${log.notes}]`:""}`).join("\n");
        const sys=`You are an elite physique coach for Rohan Goyal. Analyze his ACTUAL logged data. Never give generic advice.

PROFILE: Age 30, 188cm, ${profile.weight}kg, ${profile.bf}% BF, SMM ${profile.smm}kg
WHR: ${profile.whr} (target <0.95) | Waist: ${profile.waist}cm | Visceral: ${profile.visceral}
Goal: ${goal.targetWeight}kg / ${goal.targetBF}% BF by ${goal.deadline} (${daysLeft} days)
Needs ${(weightToLose/(daysLeft/7)).toFixed(2)}kg/week | Bench 75kg×3→75kg×7 | QL recovered | India-based

WORKOUTS (last ${rW.length}):\n${wSum||"None yet"}
NUTRITION (last ${rN.length} days):\n${nSum||"None yet"}
${avgP?`Avg protein: ${avgP}g | Avg calories: ${avgCal}kcal`:""}
WEIGHT: ${weightHistory.slice(-5).map(h=>`${h.date}:${h.weight}kg`).join(", ")||"None"}

Be direct. Reference actual numbers. Identify the single highest-leverage action.`;

        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:coachInput}]}),
        });
        const data=await res.json();
        setCoachResponse(data.content?.map(b=>b.text||"").join("\n")||"No response.");
      } catch(e){setCoachResponse(`Error: ${e.message}`);}
      setCoachLoading(false);
    };

    return(<div style={sc}>
      <div style={{...card,background:"#0A1520",border:`1px solid ${C.blueDim}`}}>
        <div style={{fontSize:10,color:C.blue,fontWeight:700,letterSpacing:"0.8px",marginBottom:5}}>AI COACHING · READS YOUR REAL LOGGED DATA</div>
        <div style={{fontSize:13,color:C.soft,lineHeight:1.6}}>Your coach reads your actual workouts, macros and weight history before every response.</div>
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>📊 {rW.length} workouts · {rN.length} nutrition days · {weightHistory.length} weigh-ins{avgP?` · Avg protein: ${avgP}g`:""}</div>
      </div>
      <div style={card}>
        <div style={lbl}>Quick Prompts</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {["Review my recent workouts and adjust my plan","Am I hitting protein consistently?","I drank heavily last night","My weight jumped — fat or water?","I missed 5 days of training","I have a wedding this weekend","QL feeling tight today","Am I on track for my goal?"].map(p=>(
            <button key={p} onClick={()=>setCoachInput(p)} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.soft,borderRadius:20,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>{p}</button>))}
        </div>
      </div>
      <div style={card}>
        <div style={lbl}>Message Your Coach</div>
        <textarea value={coachInput} onChange={e=>setCoachInput(e.target.value)} placeholder="Tell your coach anything — missed sessions, cheat days, weight changes, soreness, travel..." style={{...ta,minHeight:100}}/>
        <button onClick={callCoach} disabled={coachLoading} style={{...btn(C.accent),opacity:coachLoading?0.6:1}}>
          {coachLoading?"Thinking...":"Get Coaching Response →"}</button>
        {coachResponse&&<div style={{background:C.surface,borderRadius:10,padding:14,fontSize:13,lineHeight:1.8,color:C.soft,whiteSpace:"pre-wrap",border:`1px solid ${C.accentDim}`,marginTop:12}}>{coachResponse}</div>}
      </div>
    </div>);
  };

  const syncDot={saving:{bg:C.amber,label:"Saving..."},saved:{bg:C.accent,label:"Saved ✓"},error:{bg:C.red,label:"Error"}}[syncStatus];

  return(<div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 14px 0",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:C.accent,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏋️</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.3px"}}>Fitness OS</div>
            <div style={{fontSize:10,color:C.muted}}>{profile.weight} kg · {profile.bf}% BF · {daysLeft}d to {goal.label} {goal.icon}</div>
          </div>
        </div>
        {syncDot&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:syncDot.bg}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncDot.bg}}/>{syncDot.label}</div>}
      </div>
      <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"9px 11px",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?C.accent:C.muted,background:"none",border:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{t}</button>))}
      </div>
    </div>
    {tab==="Today"&&<TodayTab/>}
    {tab==="Log Workout"&&<LogWorkoutTab/>}
    {tab==="Log Nutrition"&&<LogNutritionTab/>}
    {tab==="History"&&<HistoryTab/>}
    {tab==="Plan"&&<PlanTab/>}
    {tab==="Goals"&&<GoalsTab/>}
    {tab==="Coach"&&<CoachTab/>}
    {toast&&<div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:toast.color,color:toast.color===C.accent?C.accentText:C.text,borderRadius:22,padding:"11px 22px",fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,0.5)",zIndex:100,whiteSpace:"nowrap"}}>{toast.msg}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
