// compute effective volume for a set, accounting for assist type
function setVolume(s, exName){
  const isAssistEx = ASSIST_EX.includes(exName);
  if(s.drop && s.drops && s.drops.length){
    return s.drops.reduce((sum,d)=>sum + (parseFloat(d.weight)||0)*(parseFloat(d.reps)||0), 0);
  }
  const w=parseFloat(s.weight)||0, r=parseFloat(s.reps)||0;
  return w*r;
}

  const ImportTab=()=>{
    const [preview,setPreview]=useState(null);
    const [importing,setImporting]=useState(false);
    const [result,setResult]=useState(null);

    const parseCSV=(text)=>{
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length) return null;
      const headers=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
      const idx=(names)=>{for(const n of names){const i=headers.findIndex(h=>h.toLowerCase()===n.toLowerCase());if(i>=0)return i;}return -1;};
      const di=idx(["Date"]),ci=idx(["Calories"]),pi=idx(["Protein (g)","Protein"]),cbi=idx(["Carbohydrates (g)","Carbs","Carbohydrates"]),fi=idx(["Fat (g)","Fat"]);
      if(di<0) return {error:"No Date column found"};
      const byDate={};
      for(let i=1;i<lines.length;i++){
        // handle quoted commas simply
        const cells=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)?.map(c=>c.replace(/^"|"$/g,"").trim())||lines[i].split(",");
        const date=cells[di];if(!date||!/^\d{4}-\d{2}-\d{2}/.test(date))continue;
        if(!byDate[date])byDate[date]={date,calories:0,protein:0,carbs:0,fat:0};
        byDate[date].calories+=parseFloat(cells[ci])||0;
        byDate[date].protein+=parseFloat(cells[pi])||0;
        byDate[date].carbs+=parseFloat(cells[cbi])||0;
        byDate[date].fat+=parseFloat(cells[fi])||0;
      }
      const rows=Object.values(byDate).map(r=>({date:r.date,calories:Math.round(r.calories),protein:Math.round(r.protein*10)/10,carbs:Math.round(r.carbs*10)/10,fat:Math.round(r.fat*10)/10,saved_at:`${r.date}T00:00:00Z`}));
      return {rows};
    };

    const onFile=(e)=>{
      const file=e.target.files?.[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=()=>{const parsed=parseCSV(reader.result);setPreview(parsed);setResult(null);};
      reader.readAsText(file);
    };

    const doImport=async()=>{
      if(!preview?.rows)return;
      setImporting(true);
      const r=await bulkImportNutrition(preview.rows);
      setImporting(false);
      setResult(r.ok?{ok:true,count:r.count}:{ok:false,error:r.error});
      if(r.ok){showToast(`Imported ${r.count} days ✓`);setPreview(null);}
    };

    return(<div style={sc}>
      <div style={{...card,background:"#0A1520",border:`1px solid ${C.blueDim}`}}>
        <div style={{fontSize:10,color:C.blue,fontWeight:700,letterSpacing:"0.8px",marginBottom:5}}>MYFITNESSPAL CSV IMPORT</div>
        <div style={{fontSize:13,color:C.soft,lineHeight:1.6}}>
          Export your MyFitnessPal nutrition CSV (Reports → Export data), then drop it here. It aggregates all meals per day and syncs to your cloud. Existing days get updated, not duplicated.
        </div>
      </div>
      <div style={card}>
        <div style={lbl}>Upload CSV</div>
        <input type="file" accept=".csv" onChange={onFile} style={{...inp,padding:"20px 12px",cursor:"pointer"}}/>
        {preview?.error&&<div style={{color:C.red,fontSize:12,marginTop:10}}>⚠ {preview.error}</div>}
        {preview?.rows&&<div style={{marginTop:12}}>
          <div style={{fontSize:13,color:C.accent,fontWeight:700,marginBottom:8}}>✓ Found {preview.rows.length} days of nutrition</div>
          <div style={{background:C.surface,borderRadius:8,padding:10,maxHeight:180,overflowY:"auto"}}>
            {preview.rows.slice(-8).reverse().map(r=>(
              <div key={r.date} style={{fontSize:11,color:C.soft,padding:"3px 0",display:"flex",justifyContent:"space-between"}}>
                <span>{r.date}</span><span>{r.calories}kcal · P{r.protein}g</span>
              </div>))}
            <div style={{fontSize:10,color:C.muted,marginTop:6,textAlign:"center"}}>showing last 8 of {preview.rows.length}</div>
          </div>
          <button onClick={doImport} disabled={importing} style={{...btn(C.accent),opacity:importing?0.6:1}}>{importing?"Importing...":`Import ${preview.rows.length} days to Cloud →`}</button>
        </div>}
        {result?.ok&&<div style={{color:C.accent,fontSize:13,marginTop:10,fontWeight:600}}>✓ Successfully imported {result.count} days</div>}
        {result&&!result.ok&&<div style={{color:C.red,fontSize:12,marginTop:10}}>Error: {result.error}</div>}
      </div>
      <div style={card}>
        <div style={lbl}>How to export from MyFitnessPal</div>
        <div style={{fontSize:12,color:C.soft,lineHeight:1.8}}>
          1. Open MyFitnessPal on web (myfitnesspal.com)<br/>

        </div>
      </div>
    </div>);

          method:"POST",
          headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model:"claude-sonnet-5",max_tokens:1024,system:sys,messages:[{role:"user",content:coachInput}]}),
        });
        const data=await res.json();
        if(!res.ok){
          const msg=data?.error?.message||`HTTP ${res.status}`;
          setCoachResponse(`Error (${res.status}): ${msg}`);
        } else {
          const text=data.content?.map(b=>b.text||"").join("\n");
          setCoachResponse(text||"The coach returned an empty response — try rephrasing your message.");
        }
      } catch(e){setCoachResponse(`Network error: ${e.message}`);}
      setCoachLoading(false);
    };

    return(<div style={sc}>
      <div style={{...card,background:"#0A1520",border:`1px solid ${C.blueDim}`}}>
        <div style={{fontSize:10,color:C.blue,fontWeight:700,letterSpacing:"0.8px",marginBottom:5}}>AI COACHING · READS YOUR REAL LOGGED DATA</div>
        <div style={{fontSize:13,color:C.soft,lineHeight:1.6}}>Reads your actual workouts (incl. drop sets & assist tags), macros and weight before responding.</div>
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>📊 {rW.length} workouts · {Object.keys(nutritionLogs).length} nutrition days · {weightHistory.length} weigh-ins{avgP?` · avg protein ${avgP}g`:""}</div>
      </div>
      <div style={card}>
        <div style={lbl}>Quick Prompts</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {["Review my recent workouts and adjust my plan","Am I hitting protein consistently?","I drank heavily last night","My weight jumped — fat or water?","I missed 5 days of training","I have a wedding this weekend","QL feeling tight today","Am I on track for my goal?"].map(p=>(
            <button key={p} onClick={()=>setCoachInput(p)} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.soft,borderRadius:20,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>{p}</button>))}
        </div>
      </div>
      <div style={card}>
        <div style={lbl}>Message Your Coach</div>
        <textarea value={coachInput} onChange={e=>setCoachInput(e.target.value)} placeholder="Tell your coach anything — missed sessions, cheat days, weight changes, soreness, travel..." style={{...ta,minHeight:100}}/>
        <button onClick={callCoach} disabled={coachLoading} style={{...btn(C.accent),opacity:coachLoading?0.6:1}}>
          {coachLoading?"Thinking...":"Get Coaching Response →"}</button>
        {coachResponse&&<div style={{background:C.surface,borderRadius:10,padding:14,fontSize:13,lineHeight:1.8,color:C.soft,whiteSpace:"pre-wrap",border:`1px solid ${C.accentDim}`,marginTop:12}}>{coachResponse}</div>}
      </div>
    </div>);
  };

  const syncDot={saving:{bg:C.amber,label:"Saving..."},saved:{bg:C.accent,label:"Saved ✓"},error:{bg:C.red,label:"Error"}}[syncStatus];

  return(<div style={{background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
    <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 14px 0",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,background:C.accent,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏋️</div>
          <div>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.3px"}}>Fitness OS</div>
            <div style={{fontSize:10,color:C.muted}}>{profile.weight} kg · {profile.bf}% BF · {daysLeft}d to {goal.label} {goal.icon}</div>
          </div>
        </div>
        {syncDot&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:syncDot.bg}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:syncDot.bg}}/>{syncDot.label}</div>}
      </div>
      <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {TABS.map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:"9px 11px",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?C.accent:C.muted,background:"none",border:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{t}</button>))}
      </div>
    </div>
    {tab==="Today"&&<TodayTab/>}
    {tab==="Log Workout"&&<LogWorkoutTab/>}
    {tab==="Log Nutrition"&&<LogNutritionTab/>}
    {tab==="Insights"&&<InsightsTab/>}
    {tab==="History"&&<HistoryTab/>}
    {tab==="Plan"&&<PlanTab/>}
    {tab==="Import"&&<ImportTab/>}
    {tab==="Goals"&&<GoalsTab/>}
    {tab==="Coach"&&<CoachTab/>}
    {toast&&<div style={{position:"fixed",bottom:30,left:"50%",transform:"translateX(-50%)",background:toast.color,color:toast.color===C.accent?C.accentText:C.text,borderRadius:22,padding:"11px 22px",fontSize:13,fontWeight:700,boxShadow:"0 4px 24px rgba(0,0,0,0.5)",zIndex:100,whiteSpace:"nowrap"}}>{toast.msg}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
